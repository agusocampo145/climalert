# ===== App =====
spring.application.name=climalert

# ===== WeatherAPI =====
weatherapi.base-url=https://api.weatherapi.com/v1
weatherapi.key=${WEATHER_API_KEY}
weatherapi.location=Buenos Aires

# ===== Umbrales de alerta (configurables) =====
alert.temperature-threshold=35
alert.humidity-threshold=60

# ===== Destinatarios de alerta =====
alert.recipients=admin@clima.com,emergencias@clima.com,meteorologia@clima.com

# ===== Base de datos (H2) =====
spring.datasource.url=jdbc:h2:file:./data/climalert
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true

# ===== Correo =====
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
